name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        # Provide placeholder env so the build doesn't fail on missing keys.
        # FAL_ADMIN_KEY is only read at request time; APP_PASSWORD unset
        # disables the password gate so AUTH_SECRET is harmless either way.
        env:
          FAL_ADMIN_KEY: "ci-placeholder"
          AUTH_SECRET: "ci-placeholder-secret"
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
