name: release

# Fires when you push a semver tag (e.g. v1.0.0). Two jobs run in parallel:
#
#   1. docker  — multi-arch (amd64 + arm64) Docker build, pushed to GHCR
#                with both the exact tag (`v1.0.0`), the minor channel
#                (`1.0`), and `latest`. The image is publicly pullable so
#                forks don't need credentials to try it out.
#
#   2. release — creates a GitHub Release whose notes are extracted from
#                CHANGELOG.md for the matching version. Keeps the changelog
#                as the single source of truth for "what changed".
#
# Auth uses the repo's built-in GITHUB_TOKEN — no extra secrets needed,
# provided `packages: write` and `contents: write` are granted (set below
# in `permissions`).

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        id: notes
        # Pulls the section between the matching `## [vX.Y.Z]` heading and
        # the next `##` heading. If nothing matches, falls back to a stock
        # one-liner so the release isn't blocked by missing changelog.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md || true)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for the full history."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false
          draft: false
          prerelease: false
